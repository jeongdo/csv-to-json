<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/csv_to_json.ico">
    <link rel="stylesheet" href="/style.css">
    <title>CsvToJson 변환기</title>
</head>

<body>

<div class="header-container">
    <img src="/csv_to_json.ico" alt="Logo" class="app-logo">
    <h2>CSV to JSON 변환기</h2>
</div>

<div class="notice">
    <strong>※ 첫 번째 행(Header)에 반드시 칼럼명이 포함되어 있어야 합니다.</strong><br>
    ※ 첫 행의 칼럼명을 기반으로 JSON의 key 값이 자동으로 생성됩니다.
</div>

<form id="convertForm">
    <div class="form-group">
        <input type="file" name="csvFile" accept=".csv" required>
    </div>
    <button type="submit">업로드 및 JSON 다운로드</button>
</form>

<div id="toast"></div>

<script>
    function forceResize() {
        if (window.resizeTo) {
            window.resizeTo(520, 360);
        }
    }

    window.addEventListener('DOMContentLoaded', forceResize);

    // 타이머 관리를 위한 변수 선언
    let toastTimer = null;

    function showToast(message, type) {
        const toast = document.getElementById('toast');

        toast.textContent = message;
        toast.className = type + ' show';

        // 기존 대기 중인 타이머가 있다면 초기화
        if (toastTimer) {
            clearTimeout(toastTimer);
        }

        // 클릭 시 즉시 닫기 기능 및 타이머 클리어
        toast.onclick = function () {
            toast.classList.remove('show');
            if (toastTimer) {
                clearTimeout(toastTimer);
            }
        };

        // 3초 후 자동 닫힘 코드
        toastTimer = setTimeout(function () {
            toast.classList.remove('show');
        }, 3000);
    }

    document.getElementById('convertForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const button = document.querySelector('button[type="submit"]');
        button.disabled = true;
        button.innerText = '변환 중...';

        const formData = new FormData(this);

        try {
            const response = await fetch('/convert', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const errorText = await response.text();
                showToast(errorText, 'error');
                button.disabled = false;
                button.innerText = '업로드 및 JSON 다운로드';
                return;
            }

            const blob = await response.blob();
            let filename = 'result.json';
            const disposition = response.headers.get('Content-Disposition');

            if (disposition) {
                const match = disposition.match(/filename="?([^"]+)"?/);
                if (match) {
                    filename = match[1];
                }
            }

            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;

            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);

            showToast('변환이 완료되었습니다.', 'success');

        } catch (err) {
            showToast('변환 중 오류가 발생했습니다.', 'error');
        }

        button.disabled = false;
        button.innerText = '업로드 및 JSON 다운로드';
    });

    window.addEventListener('beforeunload', function () {
        navigator.sendBeacon('/shutdown');
    });
</script>

</body>
</html>
