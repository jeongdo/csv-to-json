<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/app.ico">
    <link rel="stylesheet" href="/style.css">

    <title id="pageTitle">CSV to JSON Converter</title>
</head>

<body>

<div class="header-container">
    <img src="/app.ico" alt="Logo" class="app-logo">
    <h2 id="title">CSV to JSON Converter</h2>
</div>

<div class="notice">
    <strong id="notice1">
        First row must contain column headers.
    </strong>
    <br>
    <span id="notice2">
        JSON keys are generated automatically from the header row.
    </span>
</div>

<form id="convertForm">
    <div class="form-group">
        <input type="file" name="csvFile" accept=".csv" required>
    </div>

    <button id="convertButton" type="submit">
        Upload and Download JSON
    </button>
</form>

<div id="toast"></div>

<script src="/app.js"></script>

</body>
</html>
