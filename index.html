<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/app.ico">
    <link rel="stylesheet" href="/style.css">
    <title>CsvToJson 변환기</title>
</head>

<body>

<div class="header-container">
    <img src="/app.ico" alt="Logo" class="app-logo">
    <h2>CSV to JSON 변환기</h2>
</div>

<div class="notice">
    <strong>※ 첫 번째 행(Header)에 반드시 칼럼명이 포함되어 있어야 합니다.</strong><br>
    ※ 첫 행의 칼럼명을 기반으로 JSON의 key 값이 자동으로 생성됩니다.
</div>

<form id="convertForm">
    <div class="form-group">
        <input type="file" name="csvFile" accept=".csv" required>
    </div>
    <button type="submit">업로드 및 JSON 다운로드</button>
</form>

<div id="toast"></div>

<script>
    function forceResize() {
        if (window.resizeTo) {
            window.resizeTo(520, 360);
        }
    }

    window.addEventListener('DOMContentLoaded', forceResize);

    let toastTimer = null;

    function showToast(message, type) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = type + ' show';

        if (toastTimer) {
            clearTimeout(toastTimer);
        }

        toast.onclick = function () {
            toast.classList.remove('show');
            if (toastTimer) {
                clearTimeout(toastTimer);
            }
        };

        toastTimer = setTimeout(function () {
            toast.classList.remove('show');
        }, 3000);
    }

    document.getElementById('convertForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const button = document.querySelector('button[type="submit"]');
        button.disabled = true;
        button.innerText = '변환 중...';

        // 👈 [수정] 업로드한 파일 객체에서 원본 파일명을 안전하게 선제 추출
        const fileInput = this.querySelector('input[name="csvFile"]');
        const file = fileInput.files[0];
        let filename = 'result.json';

        if (file) {
            const originalName = file.name;
            const lastDot = originalName.lastIndexOf('.');
            // 확장자를 제외한 진짜 파일명에 .json만 깔끔하게 붙임 (예: 정상.csv -> 정상.json)
            filename = (lastDot !== -1 ? originalName.substring(0, lastDot) : originalName) + '.json';
        }

        const formData = new FormData(this);

        try {
            const response = await fetch('/convert', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const errorText = await response.text();
                showToast(errorText, 'error');
                button.disabled = false;
                button.innerText = '업로드 및 JSON 다운로드';
                return;
            }

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;

            // 👈 [핵심] 불안정한 백엔드 헤더 정규식 파싱을 버리고 위에서 추출한 동적 파일명 꽂기
            a.download = filename;

            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);

            showToast('변환이 완료되었습니다.', 'success');

        } catch (err) {
            showToast('변환 중 오류가 발생했습니다.', 'error');
        }

        button.disabled = false;
        button.innerText = '업로드 및 JSON 다운로드';
    });

    window.addEventListener('beforeunload', function () {
        navigator.sendBeacon('/shutdown');
    });
</script>

</body>
</html>
