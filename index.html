<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 크롬 창 고유 식별 파비콘 경로를 매립한 .ico 파일로 지정 -->
    <link rel="icon" type="image/x-icon" href="/app.ico">
    <title>CsvToJson 변환기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 90%; margin: 15px auto; padding: 15px; border: 1px solid #e0e0e0; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background-color: #fcfcfc; overflow: hidden; }

        .header-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .app-logo { width: 28px; height: 28px; object-fit: contain; }
        h2 { text-align: center; color: #333; margin: 0; font-size: 18px; }

        .notice { background-color: #fff3cd; color: #856404; padding: 10px; border-radius: 6px; font-size: 12px; margin-bottom: 15px; border-left: 5px solid #ffeeba; line-height: 1.4; }
        .form-group { margin-bottom: 15px; text-align: center; }
        input[type="file"] { padding: 8px; border: 1px dashed #aaa; width: 100%; background: #fff; cursor: pointer; box-sizing: border-box; font-size: 13px; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
<div class="header-container">
    <!-- 상단 타이틀 영역에 .ico 파일 연동 -->
    <img src="/app.ico" alt="Logo" class="app-logo">
    <h2>CSV to JSON 변환기</h2>
</div>

<div class="notice">
    <strong>※ 첫 번째 행(Header)에 반드시 칼럼명이 포함되어 있어야 합니다.</strong><br>
    ※ 첫 행의 칼럼명을 기반으로 JSON의 key 값이 자동으로 생성됩니다.
</div>

<form id="convertForm" action="/convert" method="post" enctype="multipart/form-data">
    <div class="form-group">
        <input type="file" name="csvFile" accept=".csv" required>
    </div>
    <button type="submit">업로드 및 JSON 다운로드</button>
</form>

<script>
    // 크롬 앱 모드의 창 크기를 아담하게 강제 고정하는 함수
    function forceResize() {
        if (window.resizeTo) {
            window.resizeTo(520, 360);
        }
    }
    window.addEventListener('DOMContentLoaded', forceResize);

    // 변환 성공 후 다운로드가 트리거되면 1초 뒤 창을 완전히 닫음
    document.getElementById('convertForm').addEventListener('submit', function() {
        setTimeout(function() {
            window.close();
        }, 1000);
    });

    // 사용자가 창을 닫으면 백엔드 Go 프로세스도 즉시 동반 종료 신호를 보냄
    window.addEventListener('beforeunload', function () {
        navigator.sendBeacon('/shutdown');
    });
</script>
</body>
</html>
