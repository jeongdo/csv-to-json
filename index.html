<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/app.ico">
    <link rel="stylesheet" href="/style.css">

    <title id="pageTitle">CSV to JSON Converter</title>
</head>

<body>

<div class="header-container">
    <img src="/app.ico" alt="Logo" class="app-logo">
    <h2 id="title">CSV to JSON Converter</h2>
</div>

<div class="notice">
    <strong id="notice1">
        First row must contain column headers.
    </strong>
    <br>
    <span id="notice2">
        JSON keys are generated automatically from the header row.
    </span>
</div>

<form id="convertForm">

    <div id="dropZone" class="drop-zone">
        <div class="drop-zone-content">
            <div class="drop-icon"></div>

            <div id="dropText" class="drop-text">
                Drag & Drop CSV File Here
            </div>

            <div class="drop-subtext">
                or
            </div>

            <label for="csvFile" class="file-select-btn">
                Select CSV File
            </label>

            <input id="csvFile" type="file" name="csvFile" accept=".csv" required hidden>

            <div id="selectedFileName" class="selected-file">
                No file selected
            </div>
        </div>
    </div>

    <button id="convertButton" type="submit">
        Upload and Download JSON
    </button>
</form>

<div id="toast"></div>

<script src="/app.js"></script>

</body>
</html>
